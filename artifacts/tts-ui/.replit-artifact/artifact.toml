kind = "web"
previewPath = "/"
title = "VoxCPM TTS"
version = "1.0.0"
id = "artifacts/tts-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18193

[services.development]
run = "pnpm --filter @workspace/tts-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tts-ui", "run", "build" ]
publicDir = "artifacts/tts-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18193"
BASE_PATH = "/"
