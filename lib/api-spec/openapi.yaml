openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VoxCPM TTS API powered by Cloudflare Workers AI
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tts
    description: Text-to-Speech operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /tts/synthesize:
    post:
      operationId: synthesizeSpeech
      tags: [tts]
      summary: Synthesize speech from text
      description: Converts text to speech using Cloudflare Workers AI (MeloTTS)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TtsInput"
      responses:
        "200":
          description: Audio file (WAV)
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tts/models:
    get:
      operationId: getTtsModels
      tags: [tts]
      summary: List available TTS models and languages
      responses:
        "200":
          description: List of available TTS models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TtsModels"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    TtsInput:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: The text to convert to speech
          minLength: 1
          maxLength: 2000
        lang:
          type: string
          description: Language code (e.g. EN, ZH, ES, FR, JP, KR)
          default: EN
        speed:
          type: number
          description: Speech speed multiplier (0.5 to 2.0)
          default: 1.0
    TtsModels:
      type: object
      required:
        - models
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/TtsModel"
    TtsModel:
      type: object
      required:
        - id
        - name
        - languages
      properties:
        id:
          type: string
        name:
          type: string
        languages:
          type: array
          items:
            $ref: "#/components/schemas/TtsLanguage"
    TtsLanguage:
      type: object
      required:
        - code
        - label
      properties:
        code:
          type: string
        label:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
