openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VoxCPM TTS API — powered by the real VoxCPM2 model via HuggingFace Spaces
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tts
    description: Text-to-Speech operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /tts/synthesize:
    post:
      operationId: synthesizeSpeech
      tags: [tts]
      summary: Synthesize speech using VoxCPM2
      description: |
        Calls the real VoxCPM2 model via HuggingFace Spaces Gradio API.
        Supports three modes: Voice Design, Controllable Cloning, Ultimate Cloning.
        Returns raw audio binary (WAV).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoxCpmInput"
      responses:
        "200":
          description: Generated audio (WAV)
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream HuggingFace error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tts/models:
    get:
      operationId: getTtsModels
      tags: [tts]
      summary: List available TTS models
      responses:
        "200":
          description: Available models info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TtsModels"
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
    VoxCpmInput:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Text to synthesize (up to 2000 chars)
          minLength: 1
          maxLength: 2000
        control_instruction:
          type: string
          description: |
            Voice Design: describe the voice (gender, age, tone, emotion, pace).
            Controllable Cloning: style guidance on top of reference audio timbre.
            Leave empty for Ultimate Cloning.
          default: ""
        reference_audio_base64:
          type: ["string", "null"]
          description: Base64-encoded reference audio for cloning modes (WAV/MP3). Null for Voice Design.
          default: null
        reference_audio_name:
          type: ["string", "null"]
          description: Filename of the reference audio (e.g. reference.wav)
          default: null
        use_prompt_text:
          type: boolean
          description: Enable Ultimate Cloning mode (requires reference_audio_base64 + prompt_text)
          default: false
        prompt_text:
          type: string
          description: Transcript of the reference audio for Ultimate Cloning
          default: ""
        cfg_value:
          type: number
          description: CFG guidance scale (1.0–3.0). Higher = more controlled.
          default: 2.0
        do_normalize:
          type: boolean
          description: Normalize audio loudness
          default: false
        denoise:
          type: boolean
          description: Denoise the reference audio before cloning
          default: false
    TtsModels:
      type: object
      required: [models]
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/TtsModel"
    TtsModel:
      type: object
      required: [id, name, modes, languages]
      properties:
        id:
          type: string
        name:
          type: string
        modes:
          type: array
          items:
            $ref: "#/components/schemas/TtsMode"
        languages:
          type: array
          items:
            $ref: "#/components/schemas/TtsLanguage"
    TtsMode:
      type: object
      required: [id, label, description]
      properties:
        id:
          type: string
        label:
          type: string
        description:
          type: string
    TtsLanguage:
      type: object
      required: [code, label]
      properties:
        code:
          type: string
        label:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
